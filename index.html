<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

/* ===== PAGE ===== */
body{
    margin:0;
    height:100vh;
    background:#0b0b0b;
    font-family:"Comic Sans MS", cursive;
    color:#ffd27f;
}

/* ===== SCREEN LAYOUT ===== */
.container{
    height:100vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 8%;
}

/* ===== LEFT TEXT ===== */
.text-section h1{
    font-size:52px;
    margin-bottom:20px;
}

.text-section p{
    font-size:22px;
    margin:10px 0;
}

/* ===== CAKE ===== */
.cake{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* cake tiers */
.tier{
    background:linear-gradient(#f6b38f,#e89a73);
    border-radius:14px;
    position:relative;
    box-shadow:0 10px 20px rgba(0,0,0,.3);
}

/* icing */
.tier::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:18px;
    background:#ffe6d8;
    border-radius:14px 14px 10px 10px;
}

.tier-top{
    width:140px;
    height:55px;
    z-index:3;
}

.tier-middle{
    width:190px;
    height:60px;
    margin-top:-10px;
    z-index:2;
}

.tier-bottom{
    width:240px;
    height:65px;
    margin-top:-12px;
    z-index:1;
}

/* ===== CANDLE ===== */
.candle{
    width:14px;
    height:45px;
    background:#ff8c8c;
    border-radius:4px;
    position:absolute;
    top:-50px;
    cursor:pointer;
}

/* flame */
.flame{
    width:16px;
    height:22px;
    position:absolute;
    top:-22px;
    left:-1px;
    border-radius:50%;
    background:radial-gradient(circle,#fff 10%,#ffd000 40%,#ff6a00 75%);
    animation:flicker .15s infinite alternate;
    transition:opacity .4s;
}

@keyframes flicker{
    from{transform:scale(1) rotate(-2deg);}
    to{transform:scale(1.1) rotate(2deg);}
}

/* smoke */
.smoke{
    width:24px;
    height:24px;
    background:rgba(200,200,200,.5);
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-5px;
    opacity:0;
}

.smoke.show{
    animation:smokeUp 2s forwards;
}

@keyframes smokeUp{
    from{
        opacity:.8;
        transform:translateY(0) scale(.6);
    }
    to{
        opacity:0;
        transform:translateY(-80px) scale(1.4);
    }
}

.hidden{
    opacity:0;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="text-section">
        <h1>Happy Birthday My Baby :)</h1>
        <p>Click the flame 🕯️</p>
        <p>Then, Blow the candle's out 🕯️</p>
        <p> Now </p>
<style>
        button {
            background-color: green;   /* Green background */
            color: white;              /* Text color */
            font-weight: bold;         /* Bold text */
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: darkgreen; /* Hover effect */
        }
    </style>
     <button onclick="openPage()">Click here</button>

<script>
function openPage() {
    window.location.href = "combine.html"}
</script>
</div>

    <!-- RIGHT SIDE -->
    <div class="cake">

        <div class="candle" id="candle">
            <div class="flame" id="flame"></div>
            <div class="smoke" id="smoke"></div>
        </div>

        <div class="tier tier-top"></div>
        <div class="tier tier-middle"></div>
        <div class="tier tier-bottom"></div>

    </div>

</div>

<script>

/* Candle blow effect */
const candle = document.getElementById("candle");
const flame = document.getElementById("flame");
const smoke = document.getElementById("smoke");

candle.addEventListener("click", () => {
    flame.classList.add("hidden");
    smoke.classList.add("show");
});

</script>

</body>
</html>
